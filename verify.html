<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Certificate Verification System</title>

<style>

body{
    font-family: Tahoma;
    margin:0;
    background: linear-gradient(135deg,#f6f2e7,#efe2c1,#f8f5ea);
}

.container{
    max-width:700px;
    margin:auto;
    padding:20px;
}

.card{
    background:#fff;
    padding:25px;
    border-radius:18px;
    box-shadow:0 5px 15px rgba(0,0,0,0.15);
    text-align:center;
}

h1{
    color:#7a5a12;
}

input,button{
    width:100%;
    padding:12px;
    margin:10px 0;
    font-size:16px;
    border-radius:10px;
    border:1px solid #ddd;
}

button{
    background:#b08d3c;
    color:#fff;
    border:none;
    font-weight:bold;
    cursor:pointer;
}

.result{
    margin-top:20px;
    font-size:16px;
    line-height:1.8;
    text-align:left;
}

.valid{
    color:green;
    font-weight:bold;
}

.invalid{
    color:red;
    font-weight:bold;
}

.small{
    font-size:13px;
    color:#666;
}

/* status box */
.box{
    padding:10px;
    border-radius:10px;
    margin-top:10px;
}

.ok{
    background:#e7f7ea;
    border:1px solid #2e7d32;
}

.bad{
    background:#ffe7e7;
    border:1px solid #b00020;
}

</style>
</head>

<body>

<div class="container">

<div class="card">

<h1>Certificate Verification System</h1>

<p class="small">
Internal Audit & GRC Professional Academy
</p>

<input id="certId" placeholder="Enter Certificate ID">

<button onclick="verify()">Verify</button>

<div id="result" class="result"></div>

</div>

</div>

<script>

/* ================= HASH ENGINE (must match certificate) ================= */
function hash(str){
    let h = 0;
    for(let i=0;i<str.length;i++){
        h = (h << 5) - h + str.charCodeAt(i);
        h |= 0;
    }
    return Math.abs(h);
}

/* ================= VERIFY ================= */
function verify(){

    let id = document.getElementById("certId").value.trim();
    let result = document.getElementById("result");

    if(!id){
        result.innerHTML = "<span class='invalid'>Please enter Certificate ID</span>";
        return;
    }

    let data = localStorage.getItem(id);

    if(!data){
        result.innerHTML = `
        <div class="box bad">
            <span class="invalid">❌ INVALID CERTIFICATE</span><br>
            Certificate not found in registry.
        </div>`;
        return;
    }

    let cert = JSON.parse(data);

    /* ================= RECOMPUTE HASH ================= */
    let raw = cert.name + cert.score + cert.total + cert.certId;
    let recomputedHash = hash(raw);

    let isValid = (recomputedHash === cert.hash);

    if(!isValid){
        result.innerHTML = `
        <div class="box bad">
            <span class="invalid">⚠️ TAMPERING DETECTED</span><br><br>
            Certificate data has been modified.<br>
            Hash mismatch detected.<br>
            <b>Security Status:</b> INVALID
        </div>`;
        return;
    }

    result.innerHTML = `
    <div class="box ok">
        <span class="valid">✔ VALID CERTIFICATE</span><br><br>

        <b>Name:</b> ${cert.name}<br>
        <b>Score:</b> ${cert.score} / ${cert.total}<br>
        <b>Success Rate:</b> ${cert.percent}%<br>
        <b>Certificate ID:</b> ${cert.certId}<br>
        <b>Issued:</b> ${new Date(cert.timestamp).toLocaleString()}<br>
        <b>Status:</b> SECURE ✔
    </div>
    `;
}

</script>

</body>
</html>
