<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Assessment Completion Statement</title>

<script src="https://cdn.jsdelivr.net/gh/davidshimjs/qrcodejs/qrcode.min.js"></script>

<style>

/* ================= BASE ================= */
body{
    font-family: Tahoma, Arial;
    margin:0;
    background: linear-gradient(135deg,#f6f2e7,#efe2c1,#f8f5ea);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

/* ================= A4 LANDSCAPE ================= */
.cert{
    width:297mm;
    height:210mm;
    margin:0 auto;
    background:#fff;
    padding:12mm;
    box-sizing:border-box;
    position:relative;
    overflow:hidden;
    border:8px double #1b5e20;

    display:flex;
    flex-direction:column;
    justify-content:space-between;
}

/* ================= WATERMARK ================= */
.cert::before{
    content:"GRC ACADEMY";
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%) rotate(-45deg);
    font-size:70px;
    color:rgba(27,94,32,0.06);
    font-weight:900;
    pointer-events:none;
}

/* ================= HEADER ================= */
.logo{
    text-align:center;
    font-weight:900;
    color:#1b5e20;
    font-size:18px;
}

.sublogo{
    text-align:center;
    color:#2e7d32;
    font-weight:700;
    margin-top:5px;
}

/* LOGO IMAGE */
.academy-logo{
    display:block;
    margin:10px auto;
    width:140px;
}

/* ================= TITLES ================= */
h1{
    text-align:center;
    color:#1b5e20;
    font-size:24px;
    margin:10px 0;
    font-weight:900;
}

h2{
    text-align:center;
    color:#2e7d32;
    font-size:16px;
    font-weight:700;
}

/* ================= INFO ================= */
.info{
    text-align:center;
    font-size:18px;
    font-weight:700;
    margin:6px 0;
}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
}

.badge{
    text-align:center;
    background:#1b5e20;
    color:#fff;
    padding:10px;
    font-weight:900;
    border-radius:10px;
}

/* ================= EXECUTIVE ================= */
.executive-line{
    text-align:center;
    font-size:14px;
    font-weight:900;
    color:#0d3612;
}

/* ================= BOTTOM ================= */
.bottom-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

/* ================= SEAL ================= */
.seal{
    width:120px;
    height:120px;
    border-radius:50%;
    position:relative;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:900;
    border:4px solid #d4af37;
    background: radial-gradient(circle, #fff 40%, #f3f3f3 100%);
}

.seal-inner{
    text-align:center;
    z-index:2;
}

.seal-title{font-size:10px;font-weight:900;color:#1b5e20;}
.seal-name{font-size:11px;font-weight:900;}
.seal-state{font-size:10px;margin-top:2px;}

/* ================= QR ================= */
#qr{
    width:110px;
    height:110px;
}

/* ================= PRINT ================= */
@media print{
    @page{
        size:A4 landscape;
        margin:10mm;
    }

    body{background:#fff;}

    .cert{
        border:6px double #1b5e20;
    }

    *{
        -webkit-print-color-adjust:exact;
        print-color-adjust:exact;
    }
}

</style>
</head>

<body>

<div class="cert">

    <div class="academy-header">

        <img src="https://ieashehata1965-netizen.github.io/dev-quiz/logo.png" class="academy-logo">

        <div class="logo">Internal Audit & GRC Professional Academy</div>
        <div class="sublogo">الأكاديمية المهنية للتدقيق الداخلي والحوكمة والامتثال</div>

    </div>

    <h1>Assessment Completion Statement</h1>
    <h2>إفادة اجتياز تقييم منهج CIA ضمن نظام تدريب داخلي معتمد</h2>

    <div class="info" id="name"></div>

    <div class="grid">
        <div class="info" id="score"></div>
        <div class="info" id="percent"></div>
    </div>

    <div class="badge" id="level"></div>

    <div class="info" id="certId"></div>

    <div class="bottom-row">

        <div id="seal" class="seal">
            <div class="seal-inner">
                <div class="seal-title">GRC ACADEMY</div>
                <div class="seal-name">OFFICIAL SEAL</div>
                <div class="seal-state">VERIFIED</div>
            </div>
        </div>

        <div id="qr"></div>

    </div>

    <div class="executive-line">
        Issued by: Chief Executive Officer – Internal Audit & GRC Professional Academy
    </div>

</div>

<script>
const params = new URLSearchParams(window.location.search);

let name = params.get("name") || "Unknown";
let score = parseInt(params.get("score") || 0);
let total = parseInt(params.get("total") || 0);
let certId = params.get("id") || ("CIA-" + Date.now());

let percent = total ? Math.round((score / total) * 100) : 0;

let level =
    percent >= 85 ? "Excellent (ممتاز)" :
    percent >= 70 ? "Good (جيد)" :
    "Needs Improvement (يحتاج تطوير)";

let record = {
    certId, name, score, total, percent,
    timestamp: Date.now()
};

localStorage.setItem(certId, JSON.stringify(record));

document.getElementById("name").innerHTML = "Name: " + name;
document.getElementById("score").innerHTML = "Score: " + score + " / " + total;
document.getElementById("percent").innerHTML = "Rate: " + percent + "%";
document.getElementById("level").innerHTML = level;
document.getElementById("certId").innerHTML = "Statement ID: " + certId;

let token = btoa(JSON.stringify(record));

new QRCode(document.getElementById("qr"), {
    text: token,
    width: 110,
    height: 110
});
</script>

</body>
</html>
