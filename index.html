<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Internal Audit & GRC Academy</title>

<style>

body{
    font-family: Tahoma, Arial;
    margin:0;
    background: linear-gradient(135deg,#f6f2e7,#efe2c1,#f8f5ea);
}

.container{
    max-width:850px;
    margin:auto;
    padding:15px;
}

header{
    text-align:center;
    padding:15px;
}

header h1{
    font-size:20px;
    color:#7a5a12;
    margin:5px;
}

header h2{
    font-size:14px;
    color:#555;
    font-weight:normal;
}

.card{
    background:#fff;
    padding:20px;
    margin:12px 0;
    border-radius:18px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

input,select{
    width:100%;
    padding:12px;
    margin:8px 0;
    font-size:15px;
    border-radius:10px;
    border:1px solid #ddd;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:#b08d3c;
    color:#fff;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
}

.q-box{
    background:#fff;
    padding:22px;
    margin-top:10px;
    border-radius:18px;
    box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.q-title{
    font-size:22px;
    font-weight:bold;
    margin-bottom:15px;
}

.option{
    padding:14px;
    margin:10px 0;
    border-radius:10px;
    background:#f7f7f7;
    border:1px solid #ddd;
    cursor:pointer;
    font-size:17px;
}

.option:hover{
    background:#f0e6c8;
}

.screen{display:none;}
.active{display:block;}

.small{
    font-size:13px;
    color:#666;
    text-align:center;
}

.result{
    text-align:center;
    font-size:20px;
    font-weight:bold;
    margin-top:20px;
}

</style>
</head>

<body>

<div class="container">

<header>
<h1>Internal Audit & GRC Professional Academy</h1>
<h2>الأكاديمية المهنية للتدقيق الداخلي</h2>
</header>

<div id="welcome" class="screen active card">
<h2>مرحبًا بك 👋</h2>
<p class="small">منصة تدريب احترافية</p>
<button onclick="goSetup()">بدء الاستخدام</button>
</div>

<div id="setup" class="screen card">

<h2>إعداد الاختبار</h2>

<input id="studentName" placeholder="اسم المتدرب">

<select id="track">
<option value="cia">CIA</option>
<option value="cma">CMA</option>
<option value="cfa">CFA</option>
<option value="fmaa">FMAA</option>
</select>

<select id="count">
<option value="3">3</option>
<option value="5">5</option>
<option value="10">10</option>
<option value="20">20</option>
<option value="30">30</option>
<option value="all">Full</option>
</select>

<button onclick="startExam()">ابدأ</button>

</div>

<div id="quiz" class="screen"></div>
<div id="result" class="result"></div>

</div>

<script>

let bank=[];
let exam=[];
let index=0;
let score=0;
let student="";
let track="";

function showScreen(id){
    document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}

function goSetup(){
    showScreen("setup");
}

async function loadBank(){
    const res = await fetch("cia-question-bank.json");
    bank = await res.json();
}

async function startExam(){

    student = document.getElementById("studentName").value.trim();
    track = document.getElementById("track").value;

    let count = document.getElementById("count").value;

    if(!student) return alert("أدخل الاسم");

    await loadBank();

    let pool = bank.filter(q =>
        (part === "all" || q.part == part)
    );

    if(count === "all"){
        exam = pool;
    }else{
        count = parseInt(count);
        exam = pool.sort(()=>Math.random()-0.5).slice(0, count);
    }

    index = 0;
    score = 0;

    showScreen("quiz");
    showQuestion();
}
function showQuestion(){

    if(index>=exam.length){
        showResult();
        return;
    }

    let q=exam[index];

    let html=`<div class="q-box">
    <div class="q-title">${q.q}</div>`;

    q.a.forEach((o,i)=>{
        html+=`<div class="option" onclick="answer(${i})">${o}</div>`;
    });

    html+=`</div>`;

    document.getElementById("quiz").innerHTML=html;
}

function answer(i){
    if(i===exam[index].c) score++;
    index++;
    setTimeout(showQuestion,200);
}

function showResult(){

    let percent=Math.round((score/exam.length)*100);

    document.getElementById("quiz").innerHTML="";

    document.getElementById("result").innerHTML=`
    <div class="card">
        <h2>النتيجة</h2>
        <p>${score}/${exam.length}</p>
        <p>${percent}%</p>

        <button onclick="printCertificate()">طباعة الإفادة</button>
    </div>`;
}

function printCertificate(){

    const certId = "CIA-" + Date.now();

    const percent = Math.round((score/exam.length)*100); // ✅ تعريف واضح

    const record = {
        certId,
        name: student,
        score,
        total: exam.length,
        percent: percent,
        date: new Date().toISOString()
    };

    localStorage.setItem(certId, JSON.stringify(record));

    const url =
        "certificate.html?name=" + encodeURIComponent(student) +
        "&score=" + score +
        "&total=" + exam.length +
        "&percent=" + percent +
        "&id=" + certId;

    window.location.href = url;
}
</script>

</body>
</html>
