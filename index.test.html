<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>DEV Quiz Engine</title>
<style>
body{font-family:Tahoma;background:#ecfdf5;padding:20px;text-align:center}
.card{max-width:700px;margin:auto;background:#fff;padding:20px;border-radius:12px}
button{width:100%;padding:12px;margin:8px 0;cursor:pointer}
.answer{background:#f3f4f6;border:1px solid #ddd}
.answer:hover{background:#dcfce7}
</style>
</head>

<body>

<h2>🧪 DEV Quiz Engine</h2>

<div class="card">

<input id="name" placeholder="اسم المتدرب">
<button onclick="start()">ابدأ</button>

<div id="quiz"></div>

</div>

<script>
let questions = [];
let i = 0;
let score = 0;

async function load(){
    const res = await fetch("questions.json");
    questions = await res.json();
}

function start(){
    score = 0;
    i = 0;
    load().then(show);
}

function show(){
    if(i >= questions.length){
        return document.getElementById("quiz").innerHTML =
        "<h3>النتيجة: " + score + "/" + questions.length + "</h3>";
    }

    let q = questions[i];

    let html = "<h3>" + q.q + "</h3>";

    q.a.forEach((x, idx)=>{
        html += `<button class="answer" onclick="check(${idx})">${x}</button>`;
    });

    document.getElementById("quiz").innerHTML = html;
}

function check(ans){
    if(ans === questions[i].c) score++;
    i++;
    show();
}
</script>

</body>
</html>
